<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title id="page-title">IA directions</title>
<link rel="stylesheet" href="lofi.css" />
<style>
.dir-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 24px; }
.dir-card { border: 1px solid #d0d0d0; padding: 16px; background: #fafafa; }
.dir-card h2 { font-size: 16px; margin: 0 0 8px; }
.dir-card .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin-bottom: 12px; }
.dir-card p { font-size: 12px; color: #444; margin: 0 0 10px; line-height: 1.5; }
.dir-card dl { font-size: 11px; margin: 0; }
.dir-card dt { font-weight: 600; color: #333; margin-top: 8px; }
.dir-card dd { margin: 2px 0 0; color: #555; }
</style>
</head>
<body>
<h1 id="page-h1">IA directions</h1>
<p class="subtitle" id="page-subtitle">Loading...</p>
<div id="directions" class="dir-grid">Loading directions...</div>
<script src="directions.js"></script>
</body>
</html>
